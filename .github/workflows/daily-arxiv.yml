name: Daily Research Radar

on:
  push:
    branches: [main]
  schedule:
    # 14:00 in China Standard Time (UTC+8), after arXiv's daily release peak.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: arxiv-radar-pages
  cancel-in-progress: false

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch papers and build website
        run: |
          if [ ! -f data/backfill-agent-focus-v3.done ]; then
            python fetch_arxiv.py --backfill-year 2025 --max-results 200
            touch data/backfill-agent-focus-v3.done
          elif [ ! -f data/backfill-openreview-direct-upload-v2.done ]; then
            python fetch_arxiv.py --backfill-openreview --max-results 200
            touch data/backfill-openreview-direct-upload-v2.done
          else
            python fetch_arxiv.py
          fi

      - name: Save the updated paper archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          if ! git diff --cached --quiet; then
            git commit -m "data: update daily research radar"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
